name: Azure Static Web Apps CI/CD

# Deployment environments (single Static Web App: alexsblog / salmon-ground):
#   - Push to main         -> deploys to the PRODUCTION environment
#   - Push to dev          -> deploys to the persistent "dev" preview environment
#                             (stable URL). Every push to dev reuses this same
#                             environment, so it never adds a new staging env and
#                             we stay within the Free plan's staging-environment cap.
#   - Pull request to main -> deploys to a per-PR preview environment with its own
#                             URL, posted as a comment on the PR
#   - Pull request closed  -> tears down that per-PR preview environment
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      # Build Hugo ourselves so we control the (extended) binary and Go toolchain.
      # SWA's built-in Oryx build ships an incompatible Hugo that crashes with a
      # GLIBC mismatch, so we prebuild and deploy with skip_app_build below.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.117.0"
          extended: true
      - name: Build site
        run: hugo --gc --minify
        env:
          HUGO_ENV: production
          HUGO_ENVIRONMENT: production
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_GROUND_05BA16610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "public" # Pre-built Hugo output (see Build site step)
          api_location: "" # Api source code path - optional
          output_location: "" # Already built; do not run Oryx
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_GROUND_05BA16610 }}
          action: "close"
