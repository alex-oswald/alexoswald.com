name: Azure Static Web Apps CI/CD

# Deployment environments (single Static Web App: salmon-ground):
#   - Push to main         -> deploys to the PRODUCTION environment
#   - Pull request to main -> deploys to a single, shared preview environment
#                             named "dev" (stable URL). Every PR reuses this one
#                             environment (see deployment_environment below) so we
#                             stay within the Free plan's staging-environment cap.
#   - Pull request closed  -> the close job runs, but the shared "dev" preview is
#                             intentionally persistent and reused by the next PR.
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      # Build Hugo ourselves so we control the (extended) binary and Go toolchain.
      # SWA's built-in Oryx build ships an incompatible Hugo that crashes with a
      # GLIBC mismatch, so we prebuild and deploy with skip_app_build below.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.117.0"
          extended: true
      - name: Build site
        run: hugo --gc --minify
        env:
          HUGO_ENV: production
          HUGO_ENVIRONMENT: production
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_GROUND_05BA16610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          # Send every pull request preview to a single, stable "dev" environment
          # instead of one per PR. The Free plan caps staging environments, so
          # per-PR environments pile up and eventually fail with "maximum number
          # of staging environments". On push to main this evaluates to an empty
          # string, so production deploys as normal.
          deployment_environment: ${{ github.event_name == 'pull_request' && 'dev' || '' }}
          ###### Repository/Build Configurations ######
          app_location: "public" # Pre-built Hugo output (see Build site step)
          api_location: "" # Api source code path - optional
          output_location: "" # Already built; do not run Oryx
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_GROUND_05BA16610 }}
          action: "close"
