#baseURL: 'https://alexoswald.com/'
languageCode: 'en-us'
title: "Alex's Engineering Blog"

enableRobotsTXT: true

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/alex-oswald"
      params:
        icon: github
    - name: LinkedIn
      weight: 4
      url: "https://www.linkedin.com/in/alex-oswald-9b207157/"
      params:
        icon: linkedin

params:
  navbar:
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
  comments:
    enable: true
    type: "giscus"
    giscus:
      repo: "alex-oswald/alexoswald.com"
      repoId: "R_kgDOGSe--w"
      category: "Announcements"
      categoryId: "DIC_kwDOGSe--84CaHp7"
      mapping: "title"
      inputPosition: "bottom"
      reactionsEnabled: 1
  footer:
    displayCopyright: true